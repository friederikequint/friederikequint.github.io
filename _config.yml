# Basic Site Settings
locale: "en-US"
title: "Friederike Quint"
title_separator: "-"
name: &name "Friederike Quint"
description: &description "Doctoral Candidate and Research Associate at the Chair of Digital Governance @TUM"
url: "https://friederikequint.github.io"
baseurl: ""
repository: "friederikequint/friederikequint.github.io"

# Site Author
author:
  avatar: "profile.png"
  name: "Friederike Quint"
  pronouns: "she/her"
  bio: "Doctoral candidate and research associate \n @Chair of Digital Governance, TUM"
  location: "Munich"
  employer: "Technical University of Munich"
  uri:
  email: "friederike.quint@tum.de"
  orcid: "https://orcid.org/0009-0006-7158-1369"
  github: "friederikequint"
  bluesky: "friederikeq.bsky.social"
  linkedin: "friederikequint/"

# Site Settings
teaser:
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
comments:
  provider: false
atom_feed:
  hide: false
  path:

# SEO Related
google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

# Social Sharing
twitter:
  username: &twitter
facebook:
  username:
  app_id:
  publisher:
og_image:

# Analytics
analytics:
  provider: "false"
  google:
    tracking_id:

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM          # tolerant GitHub-flavored Markdown
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults (use layouts that exist for jekyll-theme-primer)
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/Berlin

# Plugins (only GitHub Pages–whitelisted)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
